<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anti-Gravity Door | Infinite Visitor Experience</title>
    <!-- SEO Meta Tags -->
    <meta name="description"
        content="An interactive zero-gravity experience. Knock on the floating door to meet infinite surreal visitors in the deep space void.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0A0A1A;
            --door-warm: #F5A623;
            --accent-neon: #00FFD1;
            --off-white: #F0EDE6;
            --door-wood: #5D4037;
            --door-wood-dark: #3E2723;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--off-white);
            font-family: 'Nunito', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BACKGROUND VOID --- */
        .void {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #16162d 0%, #0a0a1a 100%);
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: drift var(--duration) ease-in-out infinite alternate;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(var(--tx), var(--ty)) scale(1.2);
            }
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 10;
        }

        /* --- DEBRIS layer --- */
        .debris-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .debris {
            position: absolute;
            opacity: 0.6;
            animation: zeroG var(--duration) linear infinite;
        }

        @keyframes zeroG {
            0% {
                transform: translate(var(--sx), var(--sy)) rotate(0deg);
            }

            100% {
                transform: translate(var(--ex), var(--ey)) rotate(360deg);
            }
        }

        /* --- THE DOOR --- */
        .door-container {
            position: relative;
            width: 280px;
            height: 450px;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
            -webkit-perspective: 1500px;
            perspective: 1500px;
            animation: bobbing 6s ease-in-out infinite;
            z-index: 5;
            transition: opacity 1s ease-out, transform 0.1s ease-out;
        }

        @keyframes bobbing {

            0%,
            100% {
                transform: translateY(0) rotateZ(0.5deg) scale(1);
            }

            50% {
                transform: translateY(-20px) rotateZ(-0.5deg) scale(1.02);
            }
        }

        .door-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 12px solid var(--door-wood-dark);
            border-top-color: #6a4933;
            border-left-color: #553926;
            border-right-color: #26160d;
            border-bottom-color: #1a0f09;
            box-shadow: 20px 20px 40px rgba(0, 0, 0, 0.9), 0 0 30px rgba(245, 166, 35, 0.1), inset 5px 5px 15px rgba(0, 0, 0, 0.8), inset -5px -5px 15px rgba(0, 0, 0, 0.5);
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-clip-path: inset(0);
            clip-path: inset(0);
            -webkit-transform: translateZ(-10px);
            transform: translateZ(-10px);
        }

        .door-leaf {
            position: absolute;
            top: -12px;
            left: -12px;
            width: calc(100% + 24px);
            height: calc(100% + 24px);
            background: linear-gradient(135deg, var(--door-wood), var(--door-wood-dark));
            border: 4px solid #2e1e1a;
            border-top-color: #4a3020;
            border-left-color: #5a3c26;
            transform-origin: left center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            cursor: pointer;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.6), 5px 5px 20px rgba(0, 0, 0, 0.6);
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
        }

        .door-leaf::after {
            content: '';
            position: absolute;
            top: -4px;
            right: -24px;
            width: 20px;
            height: calc(100% + 8px);
            background: #251610;
            transform-origin: left center;
            transform: rotateY(90deg);
            border: 2px solid #0a0502;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .door-leaf.open {
            -webkit-transform: rotateY(-115deg);
            transform: rotateY(-115deg);
            box-shadow: 25px 15px 40px rgba(0, 0, 0, 0.7);
        }

        /* Door wood carving details */
        .wood-panel {
            position: absolute;
            border: 4px solid rgba(0, 0, 0, 0.3);
            border-bottom-color: rgba(255, 255, 255, 0.1);
            border-right-color: rgba(255, 255, 255, 0.05);
            box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.7), inset -2px -2px 5px rgba(255, 255, 255, 0.05), 2px 2px 3px rgba(255, 255, 255, 0.1);
            -webkit-transform: translateZ(1px);
            transform: translateZ(1px);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
        }

        .panel-top {
            top: 30px;
            left: 30px;
            right: 30px;
            height: 150px;
        }

        .panel-bottom {
            bottom: 30px;
            left: 30px;
            right: 30px;
            height: 180px;
        }

        .knocker-container {
            position: absolute;
            top: 200px;
            right: 45px;
            width: 50px;
            height: 70px;
            pointer-events: none;
            -webkit-transform: translateZ(1px);
            transform: translateZ(1px);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
        }

        .knocker-base {
            width: 26px;
            height: 26px;
            background: radial-gradient(circle at 30% 30%, #fffacd, #b8860b, #5a4204);
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: 12px;
            border: 2px solid #3a2a02;
            box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.6), inset -2px -2px 5px rgba(0, 0, 0, 0.4);
            transform: translateZ(5px);
        }

        .knocker-ring {
            width: 44px;
            height: 55px;
            border: 7px solid #ffd700;
            border-bottom-color: #b8860b;
            border-right-color: #cca300;
            border-top-color: #ffeb66;
            border-radius: 50%;
            position: absolute;
            top: 10px;
            left: 3px;
            transform-origin: top center;
            box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.7), inset 2px 2px 5px rgba(255, 255, 255, 0.4), inset -2px -2px 5px rgba(0, 0, 0, 0.5);
            transform-style: preserve-3d;
            transform: translateZ(10px);
        }

        .knocker-ring.knock-anim {
            animation: knockRing 0.5s ease-out;
        }

        @keyframes knockRing {
            0% {
                transform: rotateX(0);
            }

            30% {
                transform: rotateX(-50deg);
            }

            50% {
                transform: rotateX(15deg);
            }

            70% {
                transform: rotateX(-5deg);
            }

            100% {
                transform: rotateX(0);
            }
        }

        .peephole {
            position: absolute;
            top: 130px;
            left: 50%;
            -webkit-transform: translateX(-50%) translateZ(2px);
            transform: translateX(-50%) translateZ(2px);
            width: 22px;
            height: 22px;
            background: radial-gradient(circle, #050505, #000, #111);
            border: 4px solid #b8860b;
            border-left-color: #ffeb66;
            border-bottom-color: #5a4204;
            border-radius: 50%;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8), inset 0 0 5px rgba(245, 166, 35, 0.5);
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
        }

        .door-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 20px var(--door-warm);
            opacity: 0.2;
            animation: pulseGlow 5s ease-in-out infinite;
        }

        @keyframes pulseGlow {

            0%,
            100% {
                opacity: 0.1;
            }

            50% {
                opacity: 0.4;
            }
        }

        /* --- COUNTER UI --- */
        .counter-badge {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(10, 10, 26, 0.9);
            border: 2px solid var(--accent-neon);
            padding: 20px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 255, 209, 0.15);
            text-align: right;
            z-index: 100;
        }

        .app-title {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Baloo 2', cursive;
            color: var(--accent-neon);
        }

        .counter-badge h2 {
            font-family: 'Baloo 2', cursive;
            font-size: 2.2rem;
            color: var(--accent-neon);
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        #knock-count {
            font-size: 2.8rem;
            text-shadow: 0 0 15px var(--accent-neon);
            font-weight: 800;
        }

        .counter-badge p {
            font-size: 1rem;
            color: var(--accent-neon);
            opacity: 0.8;
            margin-top: -5px;
            font-family: 'Baloo 2', cursive;
            text-transform: uppercase;
        }

        footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-family: 'Baloo 2', cursive;
            font-size: 0.9rem;
            color: var(--off-white);
            opacity: 0.5;
            letter-spacing: 2px;
            pointer-events: none;
            z-index: 100;
            text-transform: uppercase;
        }

        .knock-pulse {
            animation: badgePulse 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes badgePulse {
            0% {
                transform: scale(1);
                filter: brightness(1);
            }

            50% {
                transform: scale(1.1);
                filter: brightness(2);
            }

            100% {
                transform: scale(1);
                filter: brightness(1);
            }
        }

        /* --- VISITOR AREA --- */
        .visitor-area {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            z-index: 10;
            padding: 10px;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-transform: translateZ(1px);
            transform: translateZ(1px);
        }

        .visitor-area.visible {
            opacity: 1;
            pointer-events: all;
        }

        .character-name {
            font-family: 'Baloo 2', cursive;
            font-size: 1.4rem;
            color: var(--door-warm);
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            -webkit-transform: translateY(-20px);
            transform: translateY(-20px);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .visible .character-name {
            -webkit-transform: translateY(0);
            transform: translateY(0);
        }

        .character-graphic {
            width: 150px;
            height: 150px;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.8));
            animation: floatChar 4s ease-in-out infinite;
        }

        @keyframes floatChar {

            0%,
            100% {
                transform: translateY(0) rotate(0);
            }

            50% {
                transform: translateY(-10px) rotate(5deg);
            }
        }

        .speech-bubble {
            background: var(--off-white);
            color: var(--bg-deep);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 15px;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            -webkit-transform: scale(0);
            transform: scale(0);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
            text-align: center;
            position: relative;
        }

        .visible .speech-bubble {
            -webkit-transform: scale(1);
            transform: scale(1);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-bottom: 12px solid var(--off-white);
        }

        .close-door-btn {
            margin-top: 20px;
            background: rgba(0, 255, 209, 0.1);
            border: 2px solid var(--accent-neon);
            color: var(--accent-neon);
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 900;
            font-family: 'Nunito', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .close-door-btn:hover {
            background: var(--accent-neon);
            color: var(--bg-deep);
            box-shadow: 0 0 15px var(--accent-neon);
        }

        /* --- RECURSIVE TUNNEL --- */
        .infinite-tunnel {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 1s;
        }

        .infinite-tunnel.visible {
            opacity: 1;
        }

        .tunnel-layer {
            position: absolute;
            width: 80%;
            height: 85%;
            border: 2px solid var(--door-wood-dark);
            box-shadow: 0 0 20px var(--door-warm);
            animation: zoomOut 3s linear infinite;
        }

        @keyframes zoomOut {
            from {
                transform: scale(2);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            to {
                transform: scale(0.1);
                opacity: 0;
            }
        }

        @keyframes slideIn {
            0% {
                transform: translateX(-50px);
                opacity: 0;
            }

            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes zoomPop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .door-container {
                transform: scale(0.8);
            }

            @keyframes bobbing {

                0%,
                100% {
                    transform: translateY(0) rotateZ(0.5deg) scale(0.8);
                }

                50% {
                    transform: translateY(-15px) rotateZ(-0.5deg) scale(0.82);
                }
            }

            .counter-badge {
                top: 15px;
                right: 15px;
                padding: 12px 20px;
                border-width: 1px;
            }

            .app-title {
                font-size: 0.6rem;
            }

            .counter-badge h2 {
                font-size: 1.5rem;
            }

            #knock-count {
                font-size: 2rem;
            }

            .counter-badge p {
                font-size: 0.75rem;
            }

            footer {
                font-size: 0.75rem;
                letter-spacing: 1px;
            }
        }

        .spam-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            -webkit-transform: translateX(-50%) translateY(-50px);
            transform: translateX(-50%) translateY(-50px);
            background: #ff3333;
            color: #fff;
            padding: 10px 25px;
            border-radius: 30px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            pointer-events: none;
        }

        .spam-popup.visible {
            opacity: 1;
            visibility: visible;
            -webkit-transform: translateX(-50%) translateY(0);
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>
    <div class="spam-popup" id="spam-popup">Be calm.</div>

    <div class="void" id="void">
        <div class="grain"></div>
    </div>

    <div class="debris-layer" id="debris-layer"></div>

    <div class="counter-badge" id="counter-badge" aria-live="polite">
        <h2 class="app-title">Useless App - Infinite Doors</h2>
        <h2>KNOCKS: <span id="knock-count">0</span></h2>
        <p id="status-hint">Who's next...?</p>
    </div>

    <div class="door-container" id="door-container">
        <div class="door-frame" aria-label="A mysterious floating door">
            <div class="infinite-tunnel" id="infinite-tunnel"></div>
        </div>

        <div class="visitor-area" id="visitor-area">
            <div class="character-name" id="char-name">Visitor</div>
            <div class="character-graphic" id="char-graphic"></div>
            <div class="speech-bubble" id="char-speech">"..."</div>
            <button class="close-door-btn" id="close-door">Close Door 🚪</button>
        </div>

        <div class="door-leaf" id="door-leaf" aria-label="Knock on the door" role="button">
            <div class="door-glow"></div>
            <div class="wood-panel panel-top"></div>
            <div class="wood-panel panel-bottom"></div>
            <div class="peephole"></div>
            <div class="knocker-container">
                <div class="knocker-base"></div>
                <div class="knocker-ring" id="knocker-ring"></div>
            </div>
        </div>
    </div>

    <script>
        // --- ASSETS & ART ---
        const SVG_ART = {
            goldfish: `<svg viewBox="0 0 100 100" style="width:100%;height:100%"><circle cx="50" cy="50" r="45" fill="rgba(0,255,209,0.1)" stroke="cyan" stroke-dasharray="5 5"/><ellipse cx="50" cy="55" rx="20" ry="12" fill="orange"/><path d="M70 55 L85 45 L85 65 Z" fill="orange"/><circle cx="40" cy="52" r="3" fill="black"/><path d="M45 60 Q50 65 55 60" fill="none" stroke="red"/></svg>`,
            ghost: `<svg viewBox="0 0 100 100" style="width:100%;height:100%"><path d="M30 80 Q30 20 50 20 Q70 20 70 80 Q60 70 50 80 Q40 70 30 80" fill="white" opacity="0.8"/><circle cx="42" cy="45" r="4" fill="black"/><circle cx="58" cy="45" r="4" fill="black"/><ellipse cx="50" cy="65" rx="10" ry="5" fill="black"/></svg>`,
            alien: `<svg viewBox="0 0 100 100" style="width:100%;height:100%"><path d="M30 40 Q50 0 70 40 Q70 80 50 80 Q30 80 30 40" fill="#7ed321"/><ellipse cx="40" cy="40" rx="8" ry="12" fill="black" transform="rotate(-20 40 40)"/><ellipse cx="60" cy="40" rx="8" ry="12" fill="black" transform="rotate(20 60 40)"/><rect x="35" y="85" width="30" height="10" fill="white"/><text x="40" y="93" fill="black" font-size="8" font-family="sans-serif">REJECT</text></svg>`,
            dragon: `<svg viewBox="0 0 100 100" style="width:100%;height:100%"><path d="M30 60 Q20 30 50 20 Q80 30 70 60 L50 70 Z" fill="#e74c3c"/><circle cx="42" cy="40" r="3" fill="gold"/><circle cx="58" cy="40" r="3" fill="gold"/><path d="M50 75 Q70 85 90 75" fill="none" stroke="orange" stroke-width="5" opacity="0.8"/></svg>`,
            knight: `<svg viewBox="0 0 100 100" style="width:100%;height:100%"><rect x="30" y="20" width="40" height="50" rx="10" fill="#bdc3c7"/><rect x="30" y="40" width="40" height="8" fill="#333"/><path d="M50 10 L50 20 M40 15 L60 15" stroke="red" stroke-width="2"/></svg>`,
            cat: `<svg viewBox="0 0 100 100" style="width:100%;height:100%"><circle cx="50" cy="50" r="35" fill="#2c3e50"/><path d="M25 25 L40 45 L15 40 Z" fill="#2c3e50"/><path d="M75 25 L60 45 L85 40 Z" fill="#2c3e50"/><circle cx="40" cy="45" r="6" fill="#f1c40f"/><circle cx="60" cy="45" r="6" fill="#f1c40f"/><circle cx="60" cy="45" r="8" fill="none" stroke="gold" stroke-width="2"/><circle cx="50" cy="65" r="5" fill="#e74c3c" opacity="0.5"/></svg>`,
            traveler: `<svg viewBox="0 0 100 100" style="width:100%;height:100%"><rect x="25" y="30" width="50" height="40" rx="10" fill="#3498db"/><rect x="30" y="35" width="40" height="30" fill="#000"/><text x="35" y="55" fill="#0f0" font-family="monospace" font-size="10">88 MPH</text></svg>`,

        const INTRO_VISITORS = [
            { name: "Welcome!", art: MEME_ART.generic("#fbd38d", "#000", '<text x="35" y="85" font-size="20">✨</text>'), speech: "Welcome to the Useless - Infinite Doors!" },
            { name: "Stay Connected", art: MEME_ART.generic("#fbd38d", "#d53f8c", '<text x="35" y="85" font-size="20">📸</text>'), speech: "Follow @moegical on Instagram for more weird experiments!" },

            { name: "Entering the Void", art: SVG_ART.infinite, speech: "Buckle up. The infinite madness starts... NOW!" }
        ];

        // Create the final sequence: Intro 5 -> Everything else shuffled
        let ALL_VISITORS = [...INTRO_VISITORS, ...VISITORS, ...MEME_VISITORS, ...REGIONAL_VISITORS, ...BATCH_VISITORS, ...BOLLYWOOD_VISITORS];

        function shuffleVisitors() {
            // Keep the first 5 intro knocks fixed for promotion
            const intro = ALL_VISITORS.slice(0, 5);
            const others = ALL_VISITORS.slice(5).sort(() => Math.random() - 0.5);
            ALL_VISITORS = [...intro, ...others];
        }

        // --- STATE & AUDIO ---
        let knockCount = 0;
        let isOpen = false;
        let currentPool = [];
        let audioCtx;
        let clickTimes = [];

        function playErrorTone() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.3);
        }

        function playKnock() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            [0, 0.08, 0.16].forEach((time, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150 + (i * 10), now + time);
                osc.frequency.exponentialRampToValueAtTime(40, now + time + 0.1);
                gain.gain.setValueAtTime(0.6, now + time);
                gain.gain.exponentialRampToValueAtTime(0.01, now + time + 0.1);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + time);
                osc.stop(now + time + 0.1);
            });
        }

        // --- UI LOGIC ---
        function initVoid() {
            const voidEl = document.getElementById('void');
            for (let i = 0; i < 6; i++) {
                const neb = document.createElement('div');
                neb.className = 'nebula';
                nebulaSize = (Math.random() * 400 + 300);
                neb.style.cssText = `width:${nebulaSize}px; height:${nebulaSize}px; left:${Math.random() * 100}%; top:${Math.random() * 100}%; background:${i % 2 ? '#1a1a4a' : '#2a0a2a'}; --tx:${(Math.random() - 0.5) * 400}px; --ty:${(Math.random() - 0.5) * 400}px; --duration:${Math.random() * 20 + 20}s;`;
                voidEl.appendChild(neb);
            }
        }

        function initDebris() {
            const layer = document.getElementById('debris-layer');
            const icons = [
                '🔩', '🪴', '📬', '🧦', '🪝', '📸', '📱', '🐦', '🎵', '👻',
                '🛸', '👽', '🪐', '✨', '⚡', '💫', '☄️', '🌌', '🌠', '🚀',
                '🧿', '🔮', '🎭', '🎲', '🧩', '🧸', '🎈', '🍕', '🍩', '🍔',
                '🍟', '🍦', '☕', '🥤', '🍺', '🌮', '🍣', '🌶️', '🥑', '🥩',
                '🔥', '💧', '💨', '🍀', '🍄', '🌍', '🌋', '⛺', '🗿', '🗽',
                '💀', '🤡', '👹', '👺', '👻', '🤖', '👾', '🧛', '🧟', '🧞',
                '😂', '🤣', '😎', '😜', '🤯', '🤫', '🤔', '🤐', '🤑', '🥺'
            ];
            for (let i = 0; i < 150; i++) {
                const d = document.createElement('div');
                d.className = 'debris';
                const icon = icons[Math.floor(Math.random() * icons.length)];
                d.innerText = icon;
                d.style.cssText = `font-size:${Math.random() * 20 + 10}px; opacity:${Math.random() * 0.5 + 0.3}; left:${Math.random() * 100}%; top:${Math.random() * 100}%; --duration:${Math.random() * 40 + 20}s; --sx:${(Math.random() - 0.5) * 400}px; --sy:${(Math.random() - 0.5) * 400}px; --ex:${(Math.random() - 0.5) * 1000 + window.innerWidth}px; --ey:${(Math.random() - 0.5) * 1000}px; animation-delay:-${Math.random() * 40}s;`;
                layer.appendChild(d);
            }
        }

        function handleKnock(e) {
            if (isOpen) return;
            if (e) e.stopPropagation();

            // Spam Detection Logic
            const nowTime = Date.now();
            clickTimes.push(nowTime);
            // Keep only clicks within the last 1500 seconds
            clickTimes = clickTimes.filter(t => nowTime - t < 1500);

            if (clickTimes.length > 5) { // more than 5 clicks in 1.5 seconds
                const popup = document.getElementById('spam-popup');
                popup.classList.add('visible');
                playErrorTone();

                // Door shudder error animation
                const door = document.getElementById('door-container');
                door.style.animation = 'none';
                void door.offsetWidth;
                door.animate([
                    { transform: 'translateX(0) rotateZ(0)' },
                    { transform: 'translateX(-10px) rotateZ(-2deg)' },
                    { transform: 'translateX(10px) rotateZ(2deg)' },
                    { transform: 'translateX(0) rotateZ(0)' }
                ], { duration: 200, iterations: 2 });
                setTimeout(() => door.style.animation = '', 400);

                setTimeout(() => popup.classList.remove('visible'), 2000);
                return; // Block the knock
            }


            knockCount++;
            document.getElementById('knock-count').innerText = knockCount;

            const badge = document.getElementById('counter-badge');
            badge.classList.remove('knock-pulse');
            void badge.offsetWidth;
            badge.classList.add('knock-pulse');

            playKnock();

            const knocker = document.getElementById('knocker-ring');
            knocker.classList.remove('knock-anim');
            void knocker.offsetWidth;
            knocker.classList.add('knock-anim');

            // Door shudder
            const door = document.getElementById('door-container');
            door.style.animation = 'none';
            void door.offsetWidth;
            door.animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-4px)' },
                { transform: 'translateX(4px)' },
                { transform: 'translateX(0)' }
            ], { duration: 150 });
            setTimeout(() => door.style.animation = '', 150);

            setTimeout(revealVisitor, 600);
        }

        function revealVisitor() {
            isOpen = true;
            let visitor;

            if (knockCount <= ALL_VISITORS.length) {
                visitor = ALL_VISITORS[knockCount - 1];
            } else {
                if (currentPool.length === 0) currentPool = [...ALL_VISITORS].sort(() => Math.random() - 0.5);
                visitor = currentPool.pop();
            }

            // Update UI
            document.getElementById('char-name').innerText = visitor.name;
            const charGraphic = document.getElementById('char-graphic');
            charGraphic.innerHTML = visitor.art;
            document.getElementById('char-speech').innerText = `"${visitor.speech}"`;

            // Reset and apply random entrance animation
            charGraphic.style.animation = 'none';
            void charGraphic.offsetWidth;
            const animations = ["floatChar", "slideIn", "zoomPop"];
            const randAnim = animations[Math.floor(Math.random() * animations.length)];
            charGraphic.style.animation = `${randAnim} 3s ease-in-out infinite`;

            const tunnel = document.getElementById('infinite-tunnel');
            // Trigger tunnel for "The Void Master" or "The Infinite"
            if (visitor.name === "The Void Master" || visitor.name === "The Infinite") {
                tunnel.innerHTML = '';
                for (let i = 0; i < 15; i++) {
                    const l = document.createElement('div');
                    l.className = 'tunnel-layer';
                    l.style.animationDelay = (i * 0.2) + 's';
                    tunnel.appendChild(l);
                }
                tunnel.classList.add('visible');
            } else {
                tunnel.classList.remove('visible');
            }

            document.getElementById('door-leaf').classList.add('open');
            setTimeout(() => document.getElementById('visitor-area').classList.add('visible'), 400);
        }


        function closeDoor() {
            document.getElementById('visitor-area').classList.remove('visible');
            setTimeout(() => {
                document.getElementById('door-leaf').classList.remove('open');
                document.getElementById('infinite-tunnel').classList.remove('visible');
                isOpen = false;
            }, 300);
        }

        // --- INTERACTION ---
        function parallax(e) {
            if (isOpen) return;
            const x = (window.innerWidth / 2 - e.clientX) / 50;
            const y = (window.innerHeight / 2 - e.clientY) / 50;
            document.getElementById('door-container').style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        }

        // Events
        document.getElementById('door-leaf').addEventListener('click', handleKnock);
        document.getElementById('door-leaf').addEventListener('touchstart', (e) => { e.preventDefault(); handleKnock(); });
        document.getElementById('close-door').addEventListener('click', closeDoor);
        window.addEventListener('mousemove', parallax);
        // Global close click
        window.addEventListener('click', () => {
            if (isOpen) closeDoor();
        });

        // Entry
        window.addEventListener('load', () => {
            shuffleVisitors();
            initVoid();
            initDebris();
            const container = document.getElementById('door-container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(200px) scale(0.8)';
            setTimeout(() => {
                container.style.transition = 'all 2s cubic-bezier(0.19, 1, 0.22, 1)';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0) scale(1)';
            }, 500);
        });
